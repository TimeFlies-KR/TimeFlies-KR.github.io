<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 블로그</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    header {
      margin-bottom: 30px;
      padding: 36px;
      border-radius: 24px;
      background: #1f2937;
      color: white;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 40px;
    }

    .post-list {
      display: grid;
      gap: 18px;
    }

    .post-card {
      display: block;
      padding: 24px;
      border-radius: 20px;
      background: white;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease;
    }

    .post-card:hover {
      transform: translateY(-3px);
    }

    .post-card h2 {
      margin: 0 0 8px;
      color: #3730a3;
    }

    .post-card p {
      margin: 0;
      color: #666;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>나의 블로그</h1>
      <p>게임 기획과 개발 공부를 기록하는 공간입니다.</p>
    </header>

    <section class="post-list">
      <a class="post-card" href="Blog/게임이 만들어지는 과정 과제.html">
        <h2>내가 만들고 싶은 게임 기획 초안</h2>
        <p>스토리 중심 2D 추리 어드벤처 게임 기획 글</p>
      </a>
    </section>
  </main>
</body>
</html>
